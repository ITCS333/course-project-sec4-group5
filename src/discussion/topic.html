<!DOCTYPE html>
<html lang="en">
<head>
<!-- Character encoding -->
<meta charset="UTF-8">

<!-- Responsive viewport -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Page title -->
<title>Topic Details</title>

<!-- Optional CSS framework -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<!-- Optional custom stylesheet -->
<link rel="stylesheet" href="styles.css">

<!-- JavaScript for dynamic topic/replies functionality -->
<script src="topic.js" defer></script>
</head>
<body class="container py-4">

<!-- Header -->
<header class="mb-4">
<h1 id="topic-subject"></h1>
</header>

<!-- Main content -->
<main>

<!-- ============================================================
            Section 1: Original Post
            ============================================================ -->
<article id="original-post" class="border p-3 rounded mb-5">
<p id="op-message"></p>
<footer id="op-footer" class="text-muted mb-2"></footer>
<div id="op-actions">
<!-- topic.js will inject Edit/Delete buttons here -->
</div>
</article>

<!-- ============================================================
            Section 2: Replies
            ============================================================ -->
<section id="replies-section" class="mb-5">
<h2>Replies</h2>

<div id="reply-list-container" class="list-group">
<!-- topic.js will inject reply articles here -->
<!-- Example template:
<article class="list-group-item mb-3">
<p>Have you tried using justify-content: space-between?</p>
<footer>Posted by: Ali Hassan on 2025-01-14</footer>
<div>
<button class="delete-reply-btn" data-id="1">Delete</button>
</div>
</article>
               -->
</div>

<!-- ============================================================
                Section 3: Add a Reply Form
                ============================================================ -->
<form id="reply-form" action="#" class="border p-3 rounded mt-4">
<fieldset>
<legend>Your Reply</legend>
<div class="mb-3">
<label for="new-reply" class="form-label">Message:</label>
<textarea id="new-reply" class="form-control" rows="4" required></textarea>
</div>
<button type="submit" class="btn btn-primary">Post Reply</button>
</fieldset>
</form>
</section>

</main>
</body>
</html>
