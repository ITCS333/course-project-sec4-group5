<!DOCTYPE html>
<html lang="en">
<head>
<!-- Character encoding -->
<meta charset="UTF-8">

<!-- Responsive viewport -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Page title -->
<title>Discussion Board</title>

<!-- Optional CSS framework (Bootstrap) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<!-- Optional custom stylesheet -->
<link rel="stylesheet" href="styles.css">

<!-- JavaScript for dynamic board functionality -->
<script src="board.js" defer></script>
</head>
<body class="container py-4">

<!-- Header -->
<header class="mb-5">
<h1>General Discussion Board</h1>
</header>

<!-- Main content -->
<main>

<!-- ============================================================
            Section 1: Create a New Topic
            ============================================================ -->
<section class="mb-5">
<h2>Start a New Topic</h2>

<form id="new-topic-form" action="#" class="border p-3 rounded">
<fieldset>
<legend>New Topic Details</legend>

<div class="mb-3">
<label for="topic-subject" class="form-label">Subject:</label>
<input type="text" id="topic-subject" class="form-control" required>
</div>

<div class="mb-3">
<label for="topic-message" class="form-label">Message:</label>
<textarea id="topic-message" class="form-control" rows="6" required></textarea>
</div>

<button id="create-topic" type="submit" class="btn btn-primary">Create Topic</button>
</fieldset>
</form>
</section>

<!-- ============================================================
            Section 2: Existing Topics
            ============================================================ -->
<section>
<h2>All Topics</h2>

<!-- Placeholder for board.js to inject topic articles -->
<div id="topic-list-container" class="list-group">
<!-- Example template (board.js will inject real topics)
<article>
<h3>
<a href="topic.html?id=1">Welcome to Web Development!</a>
</h3>
<footer>Posted by: Course Admin on 2025-01-13</footer>
<div>
<button class="edit-btn" data-id="1">Edit</button>
<button class="delete-btn" data-id="1">Delete</button>
</div>
</article>
               -->
</div>
</section>

</main>
</body>
</html>
